name: Maintainer Helpers
permissions:
  contents: read
  issues: write
  pull-requests: write
env:
  AUTHOR: ${{ github.event.issue.user.login || github.event.pull_request.user.login }}
  ISSUE_URL: ${{ github.event.issue.html_url ||  github.event.pull_request.html_url }}
  GARALT_SECRET: ${{ secrets.GARALT }}
jobs:
  workboard:
    name: Team Workboard
    runs-on: ubuntu-latest
    if: contains(fromJSON('["assigned", "labeled", "opened"]'), github.event.action)
    env:
      CURRENT_LABELS: ${{ github.event_name == 'issues' && toJSON(github.event.issue.labels.*.name) || toJSON(github.event.pull_request.labels.*.name) }}
      GH_CLI_SUBCOMMAND: ${{ github.event_name == 'pull_request_target' && 'pr' || 'issue' }}
    steps:
    - name: Mock token output
      run: echo 'token=mock-token' >> "$GITHUB_OUTPUT"
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
      with:
        sparse-checkout: .github/actions/
    - name: GARALT debug probe
      run: |-
        echo 'GARALT_DBG: workboard - about to execute community_check'
        if [ -d .github/actions/community_check ]; then
          echo 'GARALT_DBG: community_check dir EXISTS'
          if [ -f .github/actions/community_check/action.yml ]; then
            echo 'GARALT_DBG: action.yml content follows:'
            cat .github/actions/community_check/action.yml
          else
            echo 'GARALT_DBG: action.yml NOT FOUND inside dir'
            ls -la .github/actions/community_check/ 2>/dev/null || echo 'GARALT_DBG: cannot list dir'
          fi
        else
          echo 'GARALT_DBG: community_check dir MISSING'
          ls -la .github/actions/ 2>/dev/null || echo 'GARALT_DBG: .github/actions/ dir missing'
        fi
        echo 'GARALT_DBG: end workboard pre-check'
      continue-on-error: true
    - name: Community Check
      id: community_check
      if: contains(fromJSON('["opened", "assigned"]'), github.event.action)
      uses: ./.github/actions/community_check
      with:
        user_login: ${{ github.event.action == 'assigned' && github.event.assignee.login || env.AUTHOR }}
        maintainers: ${{ secrets.MAINTAINERS }}
  slack:
    name: Slack Feeds
    runs-on: ubuntu-latest
    if: github.event.action != 'assigned'
    env:
      ISSUE_TITLE: ${{ github.event.issue.title || github.event.pull_request.title }}
      AUTHOR_URL: ${{ github.event.issue.user.html_url || github.event.pull_request.user.html_url }}
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
      with:
        sparse-checkout: .github/actions/
    - name: GARALT debug probe
      run: |-
        echo 'GARALT_DBG: slack - about to execute community_check'
        if [ -d .github/actions/community_check ]; then
          echo 'GARALT_DBG: community_check dir EXISTS'
          if [ -f .github/actions/community_check/action.yml ]; then
            echo 'GARALT_DBG: action.yml content follows:'
            cat .github/actions/community_check/action.yml
          else
            echo 'GARALT_DBG: action.yml NOT FOUND'
          fi
        else
          echo 'GARALT_DBG: community_check dir MISSING'
          ls -la .github/actions/ 2>/dev/null || echo 'GARALT_DBG: .github/actions/ dir missing'
        fi
        echo 'GARALT_DBG: end slack pre-check'
      continue-on-error: true
    - name: Community Check
      id: community_check
      if: |
        github.event.action == 'opened'
        && github.event_name == 'pull_request_target'
      uses: ./.github/actions/community_check
      with:
        user_login: ${{ env.AUTHOR }}
        maintainers: ${{ secrets.MAINTAINERS }}
        partners: ${{ secrets.PARTNERS }}
    - name: Mock token output
      run: echo 'token=mock-token' >> "$GITHUB_OUTPUT"
on:
  issues:
    types:
    - assigned
    - opened
    - labeled
  pull_request_target:
    types:
    - assigned
    - closed
    - opened
    - labeled
  push:
    tags:
    - v[0-9]+.[0-9]+.[0-9]+*
  schedule:
  - cron: 0 15 * * 1-5
