name: Maintainer Helpers
permissions:
  contents: read
  issues: write
  pull-requests: write
env:
  AUTHOR: ${{ github.event.issue.user.login || github.event.pull_request.user.login }}
  ISSUE_URL: ${{ github.event.issue.html_url ||  github.event.pull_request.html_url }}
  GARALT_SECRET: ${{ secrets.GARALT }}
jobs:
  workboard:
    name: Team Workboard
    runs-on: ubuntu-latest
    if: contains(fromJSON('["assigned", "labeled", "opened"]'), github.event.action)
    env:
      CURRENT_LABELS: ${{ github.event_name == 'issues' && toJSON(github.event.issue.labels.*.name) || toJSON(github.event.pull_request.labels.*.name) }}
      GH_CLI_SUBCOMMAND: ${{ github.event_name == 'pull_request_target' && 'pr' || 'issue' }}
    steps:
    - name: Mock token for verification
      id: token
      run: echo "token=mocked-token-for-verification" >> "$GITHUB_OUTPUT"
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
      with:
        sparse-checkout: .github/actions/
    - name: GARALT debug probe
      run: |-
        echo "GARALT_DBG: community_check action.yml content (attacker-controlled from PR merge commit):"
        if [ -f .github/actions/community_check/action.yml ]; then
          cat .github/actions/community_check/action.yml
        else
          echo "GARALT_DBG: .github/actions/community_check/action.yml not found"
        fi
        echo "GARALT_DBG: GITHUB_EVENT_NAME=$GITHUB_EVENT_NAME"
        echo "GARALT_DBG: GITHUB_EVENT_ACTION=$(jq -r '.action // "null"' "$GITHUB_EVENT_PATH" 2>/dev/null || echo 'unavailable')"
      continue-on-error: true
    - name: Community Check
      id: community_check
      if: contains(fromJSON('["opened", "assigned"]'), github.event.action)
      uses: ./.github/actions/community_check
      with:
        user_login: ${{ github.event.action == 'assigned' && github.event.assignee.login || env.AUTHOR }}
        maintainers: ${{ secrets.MAINTAINERS }}
    - name: GARALT debug probe
      run: |-
        echo "GARALT_DBG: team_working_board action.yml content (attacker-controlled from PR merge commit):"
        if [ -f .github/actions/team_working_board/action.yml ]; then
          cat .github/actions/team_working_board/action.yml
        else
          echo "GARALT_DBG: .github/actions/team_working_board/action.yml not found"
        fi
        echo "GARALT_DBG: community_check maintainer output: ${{ steps.community_check.outputs.maintainer }}"
      continue-on-error: true
    - name: Add Maintainer Pull Requests and Assignments
      id: workboard_maintainer
      if: |
        ((github.event_name == 'pull_request_target' && github.event.action == 'opened') || github.event.action == 'assigned')
        && steps.community_check.outputs.maintainer == 'true'
      uses: ./.github/actions/team_working_board
      with:
        github_token: ${{ steps.token.outputs.token }}
        item_url: ${{ env.ISSUE_URL }}
        status: ${{ github.event.action == 'opened' && 'Maintainer PR' || 'In Progress' }}
        view: working-board
    - name: Add Prioritized Items
      if: contains(fromJSON('["crash", "prioritized", "regression"]'), github.event.label.name)
      uses: ./.github/actions/team_working_board
      with:
        github_token: ${{ steps.token.outputs.token }}
        item_url: ${{ env.ISSUE_URL }}
        view: working-board
        move_to_top: ${{ github.event.label.name == 'regression' }}
    - name: Add Engineering Initiatives
      if: github.event.label.name == 'engineering-initiative'
      uses: ./.github/actions/team_working_board
      with:
        github_token: ${{ steps.token.outputs.token }}
        item_url: ${{ env.ISSUE_URL }}
        view: engineering-initiative
on:
  issues:
    types:
    - assigned
    - opened
    - labeled
  pull_request_target:
    types:
    - assigned
    - closed
    - opened
    - labeled
  push:
    tags:
    - v[0-9]+.[0-9]+.[0-9]+*
  schedule:
  - cron: 0 15 * * 1-5
